name: sericulture_app
description: "IoT Monitoring App for Sericulture (Silk Farming) Farm Manager"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # MQTT live data
  mqtt_client: ^10.5.0

  # REST API historical data
  dio: ^5.7.0

  # Sensor charts
  fl_chart: ^0.69.0

  # State management
  flutter_riverpod: ^2.6.1

  # Persistent session
  shared_preferences: ^2.3.3

  # Background alerts
  flutter_local_notifications: ^18.0.1

  # Fonts
  google_fonts: ^6.2.1

  # Routing
  go_router: ^14.6.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
